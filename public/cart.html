<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shopping Cart — NexCart</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="/auth.js"></script>
  <style>
    .cart-item { display:flex; align-items:center; gap:1rem; padding:1rem; border-bottom:1px solid var(--border); transition: background 0.15s; }
    .cart-item:hover { background:#fafafa; }
    .cart-item:last-child { border-bottom:none; }
    .qty-btn { width:30px;height:30px;border-radius:6px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;transition:all 0.15s;font-weight:700; }
    .qty-btn:hover:not(:disabled) { border-color:var(--brand);color:var(--brand); }
    .qty-btn:disabled { opacity:0.35;cursor:not-allowed; }
    .coupon-wrap { display:flex;gap:0.5rem; }
    .coupon-input { flex:1;border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:0.45rem 0.75rem;font-family:'DM Sans',sans-serif;font-size:0.83rem;outline:none;transition:border-color 0.15s; }
    .coupon-input:focus { border-color:var(--brand); }
    .step-badge { width:22px;height:22px;border-radius:50%;background:var(--brand);color:#fff;font-size:0.68rem;font-weight:800;display:inline-flex;align-items:center;justify-content:center;flex-shrink:0; }
    .checkout-step { display:flex;align-items:center;gap:0.6rem;padding:0.5rem 0;font-size:0.8rem;color:var(--mid); }
  </style>
</head>
<body>
<header>
  <div class="header-top">
    <a href="/" class="logo-area">
      <div class="logo-icon-wrap"><i class="fas fa-bolt"></i></div>
      <span class="logo-title">NexCart</span>
    </a>
    <div class="header-search">
      <input type="text" placeholder="Search products…" autocomplete="off" onclick="window.location.href='/'"/>
      <button class="header-search-btn" onclick="window.location.href='/'"><i class="fas fa-search"></i></button>
    </div>
    <div class="header-actions">
      <a href="/cart.html" class="hdr-btn">
        <i class="fas fa-shopping-cart"></i>
        <span class="btn-label">Cart</span>
      </a>
      <a href="/profile.html" class="hdr-btn">
        <i class="fas fa-user"></i>
        <span class="btn-label">Account</span>
      </a>
      <button class="hdr-btn" onclick="logout()">
        <i class="fas fa-sign-out-alt"></i>
        <span class="btn-label">Logout</span>
      </button>
    </div>
  </div>
</header>

<div style="max-width:1100px;margin:0 auto;padding:1.5rem">
  <!-- Breadcrumb -->
  <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:1.5rem;font-size:0.82rem">
    <a href="/" style="color:var(--mid);text-decoration:none">Home</a>
    <span style="color:var(--muted)">›</span>
    <span style="color:var(--dark);font-weight:600">Shopping Cart</span>
  </div>

  <!-- Checkout steps indicator -->
  <div style="display:flex;align-items:center;gap:0;margin-bottom:1.75rem;background:#fff;border:1px solid var(--border);border-radius:var(--radius-md);padding:0.85rem 1.25rem;overflow-x:auto">
    <div style="display:flex;align-items:center;gap:0.5rem;flex-shrink:0">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--brand);color:#fff;font-size:0.75rem;font-weight:800;display:flex;align-items:center;justify-content:center">1</div>
      <span style="font-size:0.8rem;font-weight:700;color:var(--brand)">Cart</span>
    </div>
    <div style="flex:1;height:2px;background:var(--border);margin:0 0.75rem;min-width:30px"></div>
    <div style="display:flex;align-items:center;gap:0.5rem;flex-shrink:0">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--border);color:var(--muted);font-size:0.75rem;font-weight:800;display:flex;align-items:center;justify-content:center">2</div>
      <span style="font-size:0.8rem;font-weight:500;color:var(--muted)">Checkout</span>
    </div>
    <div style="flex:1;height:2px;background:var(--border);margin:0 0.75rem;min-width:30px"></div>
    <div style="display:flex;align-items:center;gap:0.5rem;flex-shrink:0">
      <div style="width:28px;height:28px;border-radius:50%;background:var(--border);color:var(--muted);font-size:0.75rem;font-weight:800;display:flex;align-items:center;justify-content:center">3</div>
      <span style="font-size:0.8rem;font-weight:500;color:var(--muted)">Confirmation</span>
    </div>
  </div>

  <div id="alertBox"></div>
  <div id="cartContent"><div class="spinner"></div></div>
</div>

<script>
async function init(){
  const r=await apiFetch(`${API}/auth/me`);
  if(!r.ok){window.location.href='/login.html';return;}
  await loadCart();
}

async function loadCart(){
  const r=await apiFetch(`${API}/cart`);
  const d=await r.json();
  renderCart(d);
}

function renderCart({items,total}){
  const el=document.getElementById('cartContent');
  if(!items||!items.length){
    el.innerHTML=`
    <div style="text-align:center;padding:5rem 1rem;background:#fff;border-radius:12px;border:1px solid var(--border)">
      <i class="fas fa-shopping-cart" style="font-size:3.5rem;color:var(--border);margin-bottom:1rem;display:block"></i>
      <p style="color:var(--muted);margin-bottom:0.5rem;font-size:0.95rem;font-weight:600">Your cart is empty</p>
      <p style="color:var(--muted);font-size:0.82rem;margin-bottom:1.5rem">Looks like you haven't added anything yet.</p>
      <a href="/" class="btn btn-primary"><i class="fas fa-store"></i> Continue Shopping</a>
    </div>`;
    return;
  }

  const subtotal = Number(total);
  const shipping = subtotal >= 500 ? 0 : 50;
  const grandTotal = subtotal + shipping;

  el.innerHTML=`
  <div style="display:grid;grid-template-columns:1fr 300px;gap:1.25rem;align-items:start">
    <!-- Cart Items -->
    <div>
      <div class="cart-card">
        <div class="cart-card-head">
          <i class="fas fa-shopping-cart"></i> My Cart
          <span style="margin-left:auto;font-size:0.75rem;font-weight:500;color:var(--muted)">${items.length} item${items.length!==1?'s':''}</span>
        </div>
        <div>
          ${items.map(i=>`
          <div class="cart-item">
            <img src="${i.image_url||''}" onerror="this.src='https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=80'" style="width:80px;height:80px;border-radius:8px;object-fit:cover;border:1px solid var(--border);flex-shrink:0;cursor:pointer" onclick="window.open(this.src,'_blank')"/>
            <div style="flex:1;min-width:0">
              <div style="font-weight:600;font-size:0.88rem;margin-bottom:0.15rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(i.name)}</div>
              <div style="font-size:0.75rem;color:var(--muted);margin-bottom:0.4rem">In stock: ${i.stock}</div>
              <div style="font-family:'Sora',sans-serif;font-size:1rem;font-weight:800;color:var(--brand)">₱${Number(i.price).toLocaleString('en-PH',{minimumFractionDigits:2})}</div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.5rem">
              <div style="display:flex;align-items:center;gap:0.4rem">
                <button class="qty-btn" onclick="upd(${i.id},${i.quantity-1})" ${i.quantity<=1?'disabled':''}>−</button>
                <span style="min-width:2rem;text-align:center;font-weight:700;font-size:0.9rem">${i.quantity}</span>
                <button class="qty-btn" onclick="upd(${i.id},${i.quantity+1})" ${i.quantity>=i.stock?'disabled':''}>+</button>
              </div>
              <div style="font-weight:700;font-size:0.88rem">₱${(i.price*i.quantity).toLocaleString('en-PH',{minimumFractionDigits:2})}</div>
              <button onclick="del(${i.id})" style="background:none;border:none;cursor:pointer;color:var(--muted);font-size:0.75rem;display:flex;align-items:center;gap:0.25rem" onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color='var(--muted)'">
                <i class="fas fa-trash"></i> Remove
              </button>
            </div>
          </div>`).join('')}
        </div>
        <div style="padding:0.85rem 1rem;display:flex;justify-content:space-between;align-items:center;background:var(--bg)">
          <a href="/" class="btn btn-outline btn-sm"><i class="fas fa-arrow-left"></i> Continue Shopping</a>
          <button onclick="clearCart()" style="background:none;border:none;cursor:pointer;font-size:0.78rem;color:var(--muted);font-family:'DM Sans',sans-serif" onmouseover="this.style.color='var(--danger)'" onmouseout="this.style.color='var(--muted)'">
            <i class="fas fa-trash"></i> Clear Cart
          </button>
        </div>
      </div>

      <!-- Coupon Code -->
      <div class="cart-card" style="margin-top:1rem;padding:1rem">
        <div style="font-size:0.83rem;font-weight:700;color:var(--dark);margin-bottom:0.6rem"><i class="fas fa-tag" style="color:var(--brand)"></i> Coupon Code</div>
        <div class="coupon-wrap">
          <input type="text" class="coupon-input" id="couponInput" placeholder="Enter coupon code"/>
          <button class="btn btn-outline btn-sm" onclick="applyCoupon()">Apply</button>
        </div>
        <div id="couponMsg" style="font-size:0.75rem;margin-top:0.4rem"></div>
      </div>
    </div>

    <!-- Order Summary -->
    <div>
      <div class="cart-card">
        <div class="cart-card-head"><i class="fas fa-receipt"></i> Order Summary</div>
        <div style="padding:1rem">
          <div class="order-summary-item"><span>Subtotal (${items.length} items)</span><span>₱${subtotal.toLocaleString('en-PH',{minimumFractionDigits:2})}</span></div>
          <div class="order-summary-item">
            <span>Shipping</span>
            <span style="color:${shipping===0?'var(--teal)':'var(--dark)'};font-weight:600">${shipping===0?'FREE':'₱'+shipping.toFixed(2)}</span>
          </div>
          ${shipping>0?`<div style="font-size:0.72rem;color:var(--muted);margin-top:-0.2rem;margin-bottom:0.4rem">Add ₱${(500-subtotal).toFixed(2)} more for free shipping</div>`:''}
          <div class="order-summary-item"><span>Discount</span><span id="discountVal">—</span></div>
          <div class="order-summary-total"><span>Total</span><span>₱${grandTotal.toLocaleString('en-PH',{minimumFractionDigits:2})}</span></div>
          <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center;margin-top:1rem" onclick="checkout()">
            <i class="fas fa-credit-card"></i> Proceed to Checkout
          </button>
          <div style="text-align:center;font-size:0.72rem;color:var(--muted);margin-top:0.6rem">
            <i class="fas fa-lock" style="color:var(--teal)"></i> Secure & encrypted checkout
          </div>
        </div>
      </div>

      <!-- Payment Methods -->
      <div class="cart-card" style="margin-top:0.85rem">
        <div style="padding:0.85rem 1rem">
          <div style="font-size:0.78rem;font-weight:700;color:var(--mid);margin-bottom:0.6rem">We Accept</div>
          <div style="display:flex;gap:0.4rem;flex-wrap:wrap">
            <span style="background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:0.25rem 0.6rem;font-size:0.72rem;font-weight:700;color:var(--dark)"><i class="fas fa-mobile-alt" style="color:#00c0ef"></i> GCash</span>
            <span style="background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:0.25rem 0.6rem;font-size:0.72rem;font-weight:700;color:var(--dark)"><i class="fas fa-wallet" style="color:#5b2d8e"></i> PayMaya</span>
            <span style="background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:0.25rem 0.6rem;font-size:0.72rem;font-weight:700;color:var(--dark)"><i class="fas fa-money-bill-wave" style="color:var(--teal)"></i> COD</span>
            <span style="background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:0.25rem 0.6rem;font-size:0.72rem;font-weight:700;color:var(--dark)"><i class="fas fa-university" style="color:var(--brand)"></i> Bank</span>
          </div>
        </div>
      </div>

      <!-- Why shop with us -->
      <div class="cart-card" style="margin-top:0.85rem">
        <div style="padding:0.85rem 1rem">
          <div style="font-size:0.78rem;font-weight:700;color:var(--mid);margin-bottom:0.6rem">Why Shop With Us</div>
          <div style="display:flex;flex-direction:column;gap:0.45rem">
            <div style="display:flex;align-items:center;gap:0.5rem;font-size:0.78rem;color:var(--mid)"><i class="fas fa-shipping-fast" style="color:var(--brand);width:14px"></i> Fast & reliable delivery</div>
            <div style="display:flex;align-items:center;gap:0.5rem;font-size:0.78rem;color:var(--mid)"><i class="fas fa-undo" style="color:var(--brand);width:14px"></i> Easy returns within 7 days</div>
            <div style="display:flex;align-items:center;gap:0.5rem;font-size:0.78rem;color:var(--mid)"><i class="fas fa-headset" style="color:var(--brand);width:14px"></i> 24/7 customer support</div>
            <div style="display:flex;align-items:center;gap:0.5rem;font-size:0.78rem;color:var(--mid)"><i class="fas fa-shield-alt" style="color:var(--brand);width:14px"></i> 100% secure payments</div>
          </div>
        </div>
      </div>
    </div>
  </div>`;
}

function applyCoupon(){
  const code=document.getElementById('couponInput').value.trim().toUpperCase();
  const msg=document.getElementById('couponMsg');
  if(!code){msg.innerHTML='<span style="color:var(--danger)">Please enter a coupon code.</span>';return;}
  // Demo coupons
  const coupons={'NEXCART10':'10% off','WELCOME5':'₱50 off','FREESHIP':'Free shipping'};
  if(coupons[code]){msg.innerHTML=`<span style="color:var(--teal)"><i class="fas fa-check-circle"></i> Coupon applied: ${coupons[code]}</span>`;}
  else{msg.innerHTML='<span style="color:var(--danger)"><i class="fas fa-times-circle"></i> Invalid coupon code.</span>';}
}

async function clearCart(){
  if(!confirm('Remove all items from cart?'))return;
  const r=await apiFetch(`${API}/cart`);
  const d=await r.json();
  for(const i of d.items) await apiFetch(`${API}/cart/${i.id}`,{method:'DELETE'});
  await loadCart();
}

async function upd(id,qty){
  await apiFetch(`${API}/cart/${id}`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({quantity:qty})});
  await loadCart();
}
async function del(id){
  if(!confirm('Remove this item?'))return;
  await apiFetch(`${API}/cart/${id}`,{method:'DELETE'});
  await loadCart();
}
async function checkout(){
  const btn=event.target.closest('button');
  btn.innerHTML='<i class="fas fa-spinner fa-spin"></i> Processing…';
  btn.disabled=true;
  const r=await apiFetch(`${API}/orders/checkout`,{method:'POST'});
  const d=await r.json();
  if(!r.ok){
    btn.innerHTML='<i class="fas fa-credit-card"></i> Proceed to Checkout';
    btn.disabled=false;
    document.getElementById('alertBox').innerHTML=`<div class="alert alert-error">${d.error}</div>`;
    return;
  }
  document.getElementById('alertBox').innerHTML=`<div class="alert alert-success"><i class="fas fa-check-circle"></i> Order placed successfully! 🎉 Redirecting to your orders…</div>`;
  setTimeout(()=>window.location.href='/profile.html',2000);
}
// logout() provided by auth.js
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
init();
</script>
</body>
</html>
