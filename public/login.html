<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
<link rel="icon" href="/favicon.svg" type="image/svg+xml"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login — NexCart</title>
  <link rel="stylesheet" href="/css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-page">
<div class="auth-card">
  <div class="auth-logo">
    <div class="auth-logo-icon"><i class="fas fa-bolt"></i></div>
    <span class="brand">NexCart</span>
  </div>
  <p class="auth-sub">Your trusted online marketplace</p>
  <div class="tabs-pill">
    <button class="tab-pill-btn active" id="t1" onclick="sw('login')">Login</button>
    <button class="tab-pill-btn" id="t2" onclick="sw('register')">Register</button>
  </div>
  <div id="alertBox"></div>
  <div id="loginForm">
    <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" id="lEmail" placeholder="you@email.com"/></div>
    <div class="form-group"><label class="form-label">Password</label>
      <div style="position:relative">
        <input type="password" class="form-control" id="lPass" placeholder="••••••••" style="padding-right:2.5rem"/>
        <button onclick="togglePwd('lPass',this)" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted)"><i class="fas fa-eye"></i></button>
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem;padding:0.65rem" onclick="login()"><i class="fas fa-sign-in-alt"></i> Login</button>
  </div>
  <div id="registerForm" style="display:none">
    <div class="form-group"><label class="form-label">Username</label><input type="text" class="form-control" id="rUser" placeholder="johndoe"/></div>
    <div class="form-group"><label class="form-label">Email</label><input type="email" class="form-control" id="rEmail" placeholder="you@email.com"/></div>
    <div class="form-group"><label class="form-label">Password</label>
      <div style="position:relative">
        <input type="password" class="form-control" id="rPass" placeholder="Min. 6 characters" style="padding-right:2.5rem"/>
        <button onclick="togglePwd('rPass',this)" style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--muted)"><i class="fas fa-eye"></i></button>
      </div>
    </div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:0.5rem;padding:0.65rem" onclick="register()"><i class="fas fa-user-plus"></i> Create Account</button>
  </div>
  <p style="text-align:center;margin-top:1.3rem;font-size:0.82rem;color:var(--muted)">
    <a href="/" style="color:var(--brand);text-decoration:none;font-weight:600">← Back to Shop</a>
  </p>
</div>
<script>
const API='/api';
function getToken(){return localStorage.getItem('nexcart_token');}
function setToken(t){localStorage.setItem('nexcart_token',t);}

// Redirect if already logged in
const tok=getToken();
if(tok) fetch(`${API}/auth/me`,{headers:{'Authorization':'Bearer '+tok}}).then(r=>{if(r.ok)window.location.href='/';}).catch(()=>{});

function sw(t){
  document.getElementById('t1').classList.toggle('active',t==='login');
  document.getElementById('t2').classList.toggle('active',t==='register');
  document.getElementById('loginForm').style.display=t==='login'?'block':'none';
  document.getElementById('registerForm').style.display=t==='register'?'block':'none';
  document.getElementById('alertBox').innerHTML='';
}
function showAlert(m,t='error'){document.getElementById('alertBox').innerHTML=`<div class="alert alert-${t}"><i class="fas fa-${t==='error'?'exclamation-circle':'check-circle'}"></i> ${m}</div>`;}
function togglePwd(id,btn){const inp=document.getElementById(id);const show=inp.type==='password';inp.type=show?'text':'password';btn.innerHTML=`<i class="fas fa-${show?'eye-slash':'eye'}"></i>`;}

async function login(){
  const email=document.getElementById('lEmail').value.trim(),password=document.getElementById('lPass').value;
  if(!email||!password)return showAlert('Please fill in all fields.');
  const r=await fetch(`${API}/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
  const d=await r.json();
  if(!r.ok)return showAlert(d.error||'Login failed.');
  setToken(d.token);
  showAlert('Login successful! Redirecting…','success');
  setTimeout(()=>window.location.href='/',900);
}
async function register(){
  const username=document.getElementById('rUser').value.trim(),email=document.getElementById('rEmail').value.trim(),password=document.getElementById('rPass').value;
  if(!username||!email||!password)return showAlert('Please fill in all fields.');
  if(password.length<6)return showAlert('Password must be at least 6 characters.');
  const r=await fetch(`${API}/auth/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,email,password})});
  const d=await r.json();
  if(!r.ok)return showAlert(d.error||'Registration failed.');
  showAlert('Account created! Please login.','success');
  setTimeout(()=>sw('login'),1200);
}
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){if(document.getElementById('loginForm').style.display!=='none')login();else register();}
});
</script>
</body>
</html>
